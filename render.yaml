services:
  - type: web
    name: slack-codex-agent
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: "python app.py"
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
